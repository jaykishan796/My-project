<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="login.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-5">

  <div class="container d-flex justify-content-center">
    <div class="login-card-outer p-4 p-sm-5">
      <div class="login-card-inner card border-0 shadow p-4 mx-auto">
        
        <div class="text-center mb-4">
          <h2 class="fw-bold text-dark mb-1">Welcome Back</h2>
          <p class="text-muted small">Please sign in to continue</p>
        </div>

        <form>
          <div class="mb-3">
            <label for="username" class="form-label fw-bold text-dark small">Username</label>
            <input type="text" class="form-control rounded-3" id="username" placeholder="Enter your username" required>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-bold text-dark small">Password</label>
            <input type="password" class="form-control rounded-3" id="password" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="btn btn-submit w-100 py-2.5 rounded-3 text-white fw-bold shadow-sm">Login</button>
        </form>

        <div class="text-center mt-4">
          <a href="how.html" class="signup-redirect text-decoration-none small text-muted">
            Don't have an Account? <span class="fw-bold brand-link">Sign Up</span>
          </a>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
