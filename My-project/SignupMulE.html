<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <title>Sign up </title>
        <link rel="stylesheet" href="signup.css" title="" type="" />
    </head>
    <body>
        <div class="upper">
            <div class="box">
            
                <div class="innerbox">
                    
                
                 <h2>Welcome </h2>
                 <p>Please sign up for hiring Multiple editor at a time</p>
                <div class="inner">
                    <label for="First Name">First Name</label>
                    <input type="text" name="first" id="first" value="" placeholder="Enter your FirstName" />
                    
                </div>
                <div class="inner">
                    <label for="Last Name">LastName</label>
                    <input type="text" name="last" id="last" value="" placeholder="Enter your LastName" />
                    
                </div>
                <div class="inner">
                    <label for="Email">Email</label>
                    <input type="email" name="Email" id="Email" value="" placeholder="Enter your Email" />
                    
                </div>
                <div class="inner">
                    <label for="Phone Number">Phone Number</label>
                    <input type="tel" name="Phone" id="Phone" value=""maxlength="10" placeholder="Enter your Phone Number" />
                    
                </div>
                <div class="inner">
                    <label for="User name">Username</label>
                    <input type="text" name="user" id="user" value="" placeholder="create your Username" />
                    
                </div>
                
                <div class="inner">
                    <label for="Passward">Password</label>
                    <input type="text" name="Password" id="Passward" value="" placeholder="create your Password" />
                    
                </div>
                    <button>Sign up</button>
                    <a href="login.html">Already have an Account? <b>login</b></a>
                </div> 
            </div>
            
        </div>
    </body>
</html>
